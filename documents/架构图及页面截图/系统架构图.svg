      .arrow{stroke:#34404c;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
      .line{stroke:#34404c;stroke-width:2.5;fill:none}
      .dash-arrow{stroke:#34404c;stroke-width:2.3;stroke-dasharray:8 6;fill:none;marker-end:url(#arrow)}
      .label-bg{fill:#fbfcfe;stroke:none}
      .label{font:15px 'Microsoft YaHei','SimHei',Arial,sans-serif;fill:#4b5563}
      .section-label{font:700 18px 'Microsoft YaHei','SimHei',Arial,sans-serif;fill:#0f5667}
      .icon{width:40px;height:40px}
      .icon-lg{width:48px;height:48px}
