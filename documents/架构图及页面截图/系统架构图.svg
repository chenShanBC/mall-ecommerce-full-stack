      <circle cx="32" cy="32" r="26" fill="#6db33f"/>
      <path d="M17 38c12 7 26 3 32-12-8 8-17 7-25 3 4-7 12-12 24-12-2-3-8-5-15-5-15 0-25 11-25 24 0 8 4 14 10 17-2-4-2-9-1-15z" fill="#fff"/>
    </symbol>
