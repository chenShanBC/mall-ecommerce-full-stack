      <path d="M24 52h16M32 44v8" stroke="#2980a6" stroke-width="4" stroke-linecap="round"/>
    </symbol>
    <symbol id="icon-phone" viewBox="0 0 64 64">
      <rect x="20" y="8" width="24" height="48" rx="5" fill="#e9f7ff" stroke="#2980a6" stroke-width="4"/>
      <circle cx="32" cy="49" r="2.5" fill="#2980a6"/>
    </symbol>
    <symbol id="icon-nginx" viewBox="0 0 64 64">
      <path d="M32 5 55 18v28L32 59 9 46V18z" fill="#009639"/>
      <text x="32" y="42" text-anchor="middle" font-size="29" font-family="Arial" font-weight="700" fill="#fff">N</text>
    </symbol>
