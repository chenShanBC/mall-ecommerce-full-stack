      <rect x="26" y="10" width="8" height="8" fill="#2496ed"/><rect x="36" y="10" width="8" height="8" fill="#2496ed"/>
    </symbol>
    <symbol id="icon-pay" viewBox="0 0 64 64">
      <rect x="8" y="8" width="48" height="48" rx="12" fill="#1677ff"/>
      <text x="32" y="43" text-anchor="middle" font-size="31" font-family="Microsoft YaHei,Arial" font-weight="700" fill="#fff">支</text>
