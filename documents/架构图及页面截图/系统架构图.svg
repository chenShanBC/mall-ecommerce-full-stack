  <text x="1100" y="112" text-anchor="middle" class="subtitle">HTTPS 接入 · Vue 前后端分离 · Nginx 反向代理 · Spring Boot 单体多模块 · Docker Compose · MySQL / Redis / RabbitMQ</text>

  <!-- 终端访问层 -->
  <rect x="70" y="155" width="320" height="430" rx="10" class="zone"/>
  <text x="230" y="195" text-anchor="middle" class="zone-title">终端访问层</text>

  <rect x="115" y="245" width="230" height="100" rx="12" class="box client"/>
  <use href="#icon-pc" x="135" y="272" width="45" height="45"/>
