    <style><![CDATA[
      .canvas{fill:#fbfcfe;stroke:#1f2933;stroke-width:3}
      .title{font:700 42px 'Microsoft YaHei','SimHei',Arial,sans-serif;fill:#1f2933}
      .subtitle{font:18px 'Microsoft YaHei','SimHei',Arial,sans-serif;fill:#53606c}
      .zone{fill:#ffffff;stroke:#58aebe;stroke-width:2.5;stroke-dasharray:11 8}
      .zone-title{font:700 24px 'Microsoft YaHei','SimHei',Arial,sans-serif;fill:#0b6178}
      .box{stroke:#2f8fa3;stroke-width:2.5;rx:12;ry:12}
      .client{fill:#f8fbff}
      .front{fill:#eef8ff}
      .gateway{fill:#effaf2}
      .backend{fill:#fffdf1}
      .domain{fill:#fff9e8;stroke:#d4a340;stroke-width:2.2}
      .infra{fill:#f6f1ff}
      .external{fill:#f2fbff}
      .ops{fill:#f4fbf3}
      .box-title{font:700 21px 'Microsoft YaHei','SimHei',Arial,sans-serif;fill:#1f2933}
      .box-text{font:16px 'Microsoft YaHei','SimHei',Arial,sans-serif;fill:#35424f}
      .small-text{font:14px 'Microsoft YaHei','SimHei',Arial,sans-serif;fill:#35424f}
      .mini{fill:#cceef7;stroke:#317d8f;stroke-width:1.6}
