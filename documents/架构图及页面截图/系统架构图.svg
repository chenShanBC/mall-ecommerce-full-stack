    </symbol>
    <symbol id="icon-rabbit" viewBox="0 0 64 64">
      <rect x="8" y="18" width="48" height="34" rx="6" fill="#ff6600"/>
      <rect x="17" y="8" width="9" height="22" rx="3" fill="#ff6600"/>
      <rect x="33" y="8" width="9" height="22" rx="3" fill="#ff6600"/>
      <circle cx="25" cy="34" r="4" fill="#fff"/><circle cx="42" cy="34" r="4" fill="#fff"/>
