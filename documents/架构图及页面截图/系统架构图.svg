  <text x="1070" y="987" text-anchor="middle" class="small-text">mall-common</text>

  <rect x="1280" y="930" width="260" height="75" rx="10" class="domain"/>
  <text x="1410" y="960" text-anchor="middle" class="section-label">测试支撑域</text>
  <text x="1410" y="987" text-anchor="middle" class="small-text">mall-test-support</text>

