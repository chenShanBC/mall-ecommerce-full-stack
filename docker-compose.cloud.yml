version: '3.9'
services:
  mysql:
    image: mysql:8.0
    container_name: mallfei-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: mall_fei
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql/mall_fei.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mallfei-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: mallfei-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123456
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mallfei-backend
    environment:
      SPRING_PROFILES_ACTIVE: cloud
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: root123456
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DATABASE: 0
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: admin
      RABBITMQ_PASSWORD: admin123456
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started

  h5-web:
    build:
      context: ./frontend/mall-h5
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: mallfei-h5

  admin-web:
    build:
      context: ./frontend/mall-admin
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: mallfei-admin

  gateway:
    image: nginx:1.27-alpine
    container_name: mallfei-gateway
    depends_on:
      - backend
      - h5-web
      - admin-web
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
