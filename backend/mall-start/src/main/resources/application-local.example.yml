spring:
  datasource:
    url: jdbc:mysql://${MALL_MYSQL_HOST:127.0.0.1}:${MALL_MYSQL_PORT:3307}/${MALL_MYSQL_DATABASE:mall_fei}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&connectTimeout=5000&socketTimeout=10000
    username: ${MALL_MYSQL_USERNAME:root}
    password: ${MALL_MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${MALL_REDIS_HOST:localhost}
      port: ${MALL_REDIS_PORT:6379}
      database: ${MALL_REDIS_DATABASE:0}
      password: ${MALL_REDIS_PASSWORD:}
  rabbitmq:
    host: ${MALL_RABBITMQ_HOST:localhost}
    port: ${MALL_RABBITMQ_PORT:5672}
    username: ${MALL_RABBITMQ_USERNAME:guest}
    password: ${MALL_RABBITMQ_PASSWORD:}

springdoc:
  api-docs:
    enabled: true

mall:
  order:
    timeout-minutes: 15
  pay:
    alipay:
      enabled: ${MALL_PAY_ALIPAY_ENABLED:false}
      gateway: ${MALL_PAY_ALIPAY_GATEWAY:https://openapi-sandbox.dl.alipaydev.com/gateway.do}
      app-id: ${MALL_PAY_ALIPAY_APP_ID:}
      merchant-private-key: ${MALL_PAY_ALIPAY_PRIVATE_KEY:}
      alipay-public-key: ${MALL_PAY_ALIPAY_PUBLIC_KEY:}
      notify-url: ${MALL_PAY_ALIPAY_NOTIFY_URL:http://127.0.0.1:9090/api/pay/callback/alipay}
      return-url: ${MALL_PAY_ALIPAY_RETURN_URL:http://127.0.0.1:9090/api/pay/alipay/return-bridge}
      client-return-url: ${MALL_PAY_ALIPAY_CLIENT_RETURN_URL:http://localhost:5173/pay/return}
      sign-type: RSA2
      charset: UTF-8
      format: json
  user:
    alipay-login:
      gateway: ${MALL_USER_ALIPAY_GATEWAY:https://openapi.alipay.com/gateway.do}
      app-id: ${MALL_USER_ALIPAY_APP_ID:}
      merchant-private-key: ${MALL_USER_ALIPAY_PRIVATE_KEY:}
      alipay-public-key: ${MALL_USER_ALIPAY_PUBLIC_KEY:}
      sign-type: RSA2
      charset: UTF-8
      format: json
      redirect-uri: ${MALL_USER_ALIPAY_REDIRECT_URI:http://127.0.0.1:9090/api/users/login/alipay/callback}
      frontend-redirect-uri: ${MALL_USER_ALIPAY_FRONTEND_REDIRECT_URI:http://localhost:5173/alipay-landing}
      state-expire-seconds: 300
      login-ticket-expire-seconds: 120
