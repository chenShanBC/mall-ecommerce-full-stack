server:
  port: 9090

spring:
  application:
    name: mall-fei
  profiles:
    # local / cloud
    active: ${SPRING_PROFILES_ACTIVE:cloud}
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  redis-key-prefix: mall:auth:sa-token
  timeout: 2592000
  active-timeout: 7200
  is-read-header: true
  is-read-cookie: false
  is-log: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    persistAuthorization: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

mall:
  order:
    timeout-minutes: 2
  file:
    storage-type: local
    upload-dir: storage
    public-base-path: /uploads
    max-avatar-size: 2097152
  pay:
    alipay:
      enabled: ${MALL_PAY_ALIPAY_ENABLED:true}
      gateway: ${MALL_PAY_ALIPAY_GATEWAY:https://openapi-sandbox.dl.alipaydev.com/gateway.do}
      app-id: ${MALL_PAY_ALIPAY_APP_ID:9021000163654371}
      merchant-private-key: ${MALL_PAY_ALIPAY_PRIVATE_KEY:}
      alipay-public-key: ${MALL_PAY_ALIPAY_PUBLIC_KEY:}
      notify-url: ${MALL_PAY_ALIPAY_NOTIFY_URL:https://your-local-tunnel-domain/api/pay/callback/alipay}
      return-url: ${MALL_PAY_ALIPAY_RETURN_URL:https://your-local-tunnel-domain/api/pay/alipay/return-bridge}
      client-return-url: ${MALL_PAY_ALIPAY_CLIENT_RETURN_URL:https://your-local-tunnel-domain/pay/return}
      sign-type: RSA2
      charset: UTF-8
      format: json
  user:
    alipay-login:
      redirect-uri: ${MALL_USER_ALIPAY_REDIRECT_URI:https://your-local-tunnel-domain/api/users/login/alipay/callback}
      frontend-redirect-uri: ${MALL_USER_ALIPAY_FRONTEND_REDIRECT_URI:https://your-local-tunnel-domain/login}
      state-expire-seconds: ${MALL_USER_ALIPAY_STATE_EXPIRE_SECONDS:300}
      login-ticket-expire-seconds: ${MALL_USER_ALIPAY_LOGIN_TICKET_EXPIRE_SECONDS:120}
