spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/mall_fei?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&connectTimeout=5000&socketTimeout=10000
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
  rabbitmq:
    host: ${RABBITMQ_HOST:127.0.0.1}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:admin}
    password: ${RABBITMQ_PASSWORD:admin123456}

springdoc:
  api-docs:
    enabled: false

mall:
  pay:
    alipay:
      enabled: ${MALL_PAY_ALIPAY_ENABLED:true}
      gateway: ${MALL_PAY_ALIPAY_GATEWAY:https://openapi-sandbox.dl.alipaydev.com/gateway.do}
      app-id: ${MALL_PAY_ALIPAY_APP_ID:9021000163654371}
      merchant-private-key: ${MALL_PAY_ALIPAY_PRIVATE_KEY:}
      alipay-public-key: ${MALL_PAY_ALIPAY_PUBLIC_KEY:}
      notify-url: ${MALL_PAY_ALIPAY_NOTIFY_URL:http://43.139.236.10:9090/api/pay/callback/alipay}
      return-url: ${MALL_PAY_ALIPAY_RETURN_URL:http://43.139.236.10:9090/api/pay/alipay/return-bridge}
      client-return-url: ${MALL_PAY_ALIPAY_CLIENT_RETURN_URL:http://43.139.236.10/pay/return}
      sign-type: RSA2
      charset: UTF-8
      format: json
