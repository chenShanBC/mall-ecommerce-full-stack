spring:
  datasource:
    url: jdbc:mysql://${MALL_MYSQL_HOST:127.0.0.1}:${MALL_MYSQL_PORT:3306}/${MALL_MYSQL_DATABASE:mall_fei}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&connectTimeout=5000&socketTimeout=10000
    username: ${MALL_MYSQL_USERNAME:root}
    password: ${MALL_MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

springdoc:
  api-docs:
    enabled: true

mall:
  order:
    timeout-minutes: 15
  file:
    storage-type: local
    upload-dir: /home/ubuntu/storage
    public-base-path: /uploads
    max-avatar-size: 2097152
  pay:
    alipay:
      enabled: true
      gateway: https://openapi-sandbox.dl.alipaydev.com/gateway.do
      app-id: 9021000163654371
      merchant-private-key: 
      alipay-public-key: 
      notify-url: https://mallfei.cloud/api/pay/callback/alipay
      return-url: https://mallfei.cloud/api/pay/alipay/return-bridge
      client-return-url: https://mallfei.cloud/pay/return
      sign-type: RSA2
      charset: UTF-8
      format: json
  user:
    alipay-login:
      gateway: ${MALL_USER_ALIPAY_GATEWAY:https://openapi.alipay.com/gateway.do}
      app-id: ${MALL_USER_ALIPAY_APP_ID:2021006154600932}
      merchant-private-key: ${MALL_USER_ALIPAY_PRIVATE_KEY:}
      alipay-public-key: ${MALL_USER_ALIPAY_PUBLIC_KEY:}
      sign-type: RSA2
      charset: UTF-8
      format: json
      redirect-uri: https://mallfei.cloud/api/users/login/alipay/callback
      frontend-redirect-uri: https://mallfei.cloud/alipay-landing
      state-expire-seconds: 300
      login-ticket-expire-seconds: 120
