server:
  port: 8080

spring:
  application:
    name: mall-fei
  datasource:
    url: jdbc:mysql://localhost:3306/mall_fei?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

sa-token:
  token-name: Authorization
  timeout: 2592000
  active-timeout: -1
  is-read-header: true
  is-read-cookie: false
  is-log: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
