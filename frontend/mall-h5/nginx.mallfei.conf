server {
    listen 80;
    server_name h5.mallfei.cloud;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name h5.mallfei.cloud;

    ssl_certificate /etc/letsencrypt/live/mallfei.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mallfei.cloud/privkey.pem;

    root /home/ubuntu/frontend/mall-h5/dist;
    index index.html;

    # SPA history 路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 前端直连后端 API（同域转发，避免跨域）
    location /api/ {
        proxy_pass http://127.0.0.1:9090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /upload/ {
        proxy_pass http://127.0.0.1:9090;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:9090;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }
}
